<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Browser Stress Page</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #101114;
      color: #f5f5f5;
      font-family: Segoe UI, Arial, sans-serif;
    }

    #stats {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 2;
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255,255,255,0.2);
      font: 13px Consolas, monospace;
    }

    .tile {
      position: absolute;
      width: 160px;
      height: 100px;
      border: 1px solid rgba(255,255,255,0.18);
      background: linear-gradient(135deg, rgba(58, 134, 255, 0.65), rgba(255, 190, 11, 0.45));
      box-shadow: 0 12px 28px rgba(0,0,0,0.4);
      will-change: transform, opacity;
    }
  </style>
</head>
<body>
  <div id="stats">starting</div>
  <script>
    const stats = document.getElementById('stats');
    const tiles = [];
    const count = 240;
    let frame = 0;
    let memory = [];

    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'tile';
      el.style.left = `${Math.random() * window.innerWidth}px`;
      el.style.top = `${Math.random() * window.innerHeight}px`;
      document.body.appendChild(el);
      tiles.push({ el, x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, s: 0.6 + Math.random() });
    }

    function tick() {
      frame++;
      for (let i = 0; i < tiles.length; i++) {
        const item = tiles[i];
        const x = item.x + Math.sin((frame + i) * 0.013) * 120;
        const y = item.y + Math.cos((frame + i) * 0.017) * 80;
        const rot = (frame + i) % 360;
        item.el.style.transform = `translate(${x}px, ${y}px) rotate(${rot}deg) scale(${item.s})`;
        item.el.style.opacity = String(0.35 + (Math.sin((frame + i) * 0.02) + 1) * 0.3);
      }

      if (frame % 120 === 0 && memory.length < 128) {
        memory.push(new Uint8Array(4 * 1024 * 1024));
      }

      stats.textContent = `frame=${frame} tiles=${tiles.length} memoryChunks=${memory.length}`;
      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  </script>
</body>
</html>
